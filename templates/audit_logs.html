{% extends "base.html" %}
{% block content %}
<section class="panel">
    <h1>Audit Logs</h1>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Action</th>
                    <th>Certificate ID</th>
                    <th>Message</th>
                </tr>
            </thead>
            <tbody>
                {% for log in logs %}
                <tr>
                    <td>{{ log.time }}</td>
                    <td>{{ log.action }}</td>
                    <td>{{ log.certificate_id }}</td>
                    <td>{{ log.message }}</td>
                </tr>
                {% else %}
                <tr><td colspan="4">No audit logs yet.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
